version: '3.8'

services:
  vue-frontend:
    image: nginx:alpine
    container_name: vue-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./fnos-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=Asia/Shanghai