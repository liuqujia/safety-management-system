name: 🚀 构建前端（输出为 artifact）

on:
  push:
    branches:
      - main
    paths:
      - 'safety-vue/**'
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build Vue frontend
        working-directory: safety-vue
        run: |
          pnpm approve-builds 2>/dev/null || true
          pnpm install
          pnpm build
          echo "✅ 前端构建完成"
          ls -la dist/

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: safety-vue/dist/
          retention-days: 14
